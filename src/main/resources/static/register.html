<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>KinoXP – Opret konto</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f0ec; }

        header {
            background: #6B3A2A;
            padding: 2rem;
            text-align: center;
        }
        header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3rem;
            color: #f5e6d3;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        main {
            display: flex;
            gap: 2rem;
            padding: 3rem 4rem;
            align-items: flex-start;
            max-width: 900px;
            margin: 0 auto;
        }

        .register-form {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            width: 260px;
        }

        .field-label {
            background: #6B3A2A;
            color: #f5e6d3;
            padding: 0.6rem 1rem;
            border-radius: 3px;
            font-size: 0.9rem;
            text-align: center;
        }

        .register-form input {
            background: white;
            border: 1px solid #d4c4b8;
            padding: 0.7rem 1rem;
            border-radius: 3px;
            font-size: 0.9rem;
            outline: none;
            font-family: Arial, sans-serif;
            width: 100%;
        }
        .register-form input:focus { border-color: #6B3A2A; }

        .register-btn {
            background: #6B3A2A;
            color: white;
            border: none;
            padding: 0.7rem 1rem;
            border-radius: 3px;
            font-size: 0.95rem;
            cursor: pointer;
            width: 100%;
            margin-top: 0.5rem;
        }
        .register-btn:hover { background: #4e2a1e; }

        .msg {
            padding: 0.6rem 1rem;
            border-radius: 3px;
            font-size: 0.85rem;
            text-align: center;
            display: none;
        }
        .msg.error { background: #c0392b; color: white; display: block; }
        .msg.success { background: #27ae60; color: white; display: block; }

        .cinema-image {
            flex: 1;
            background: #6B3A2A;
            border-radius: 4px;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f5e6d3;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

<header>
    <h1>KinoXP</h1>
</header>

<main>
    <div class="register-form">
        <div class="field-label">Brugernavn</div>
        <input type="text" id="username" placeholder="Vælg brugernavn">
        <div class="field-label">Adgangskode</div>
        <input type="password" id="password" placeholder="Vælg adgangskode">
        <div class="msg" id="msg"></div>
        <button class="register-btn" onclick="register()">Opret konto</button>
        <a href="/login.html" style="display:block; text-align:center; margin-top:0.5rem; color:#6B3A2A; font-size:0.85rem;">Har du allerede en konto? Log ind</a>
    </div>

    <div class="cinema-image">
        Billede af biograf
    </div>
</main>

<script>
    function register() {
        var username = document.getElementById('username').value.trim();
        var password = document.getElementById('password').value.trim();
        var msg = document.getElementById('msg');

        if (!username || !password) {
            msg.textContent = 'Udfyld alle felter.';
            msg.className = 'msg error';
            return;
        }

        fetch('/api/customers/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: username, password: password })
        })
            .then(function(r) {
                if (!r.ok) return r.text().then(function(t) { throw new Error(t); });
                msg.textContent = 'Konto oprettet! Du sendes til login...';
                msg.className = 'msg success';
                setTimeout(function() {
                    window.location.href = '/login.html';
                }, 1500);
            })
            .catch(function(err) {
                msg.textContent = err.message || 'Noget gik galt.';
                msg.className = 'msg error';
            });
    }
</script>

</body>
</html>
